syntax = "proto3";

package edgereplica.sync.v1;

// SQLite page synchronization. The client opens a single bidi `Sync` stream
// authenticated with a short-lived sync macaroon (issued by AdminService).
// The worker is a thin auth/routing edge — it verifies the token, resolves
// the per-database Durable Object, and forwards the bidi request body
// through. The DO terminates the RPC and runs the FSM with direct
// SqlStorage access.
service SyncService {
  rpc Sync(stream ClientEnvelope) returns (stream ServerEnvelope);
}

// Wire-protocol version. Bump when the FSM semantics change in a way that
// older clients can't parse. Carried on Hello so peers can fail fast on a
// mismatch instead of getting confused later.
message ProtocolVersion {
  uint32 version = 1;
}

message ClientEnvelope {
  oneof payload {
    Hello hello = 1;
    PageHash page_hash = 2;
    PageHashBatch page_hash_batch = 3;
    PageData page_data = 4;
    PageDataBatch page_data_batch = 5;
    Complete complete = 6;
  }
}

message ServerEnvelope {
  oneof payload {
    HelloReply hello_reply = 1;
    HashMismatch hash_mismatch = 2;
    HashMismatchBatch hash_mismatch_batch = 3;
    RequestPage request_page = 4;
    RequestPages request_pages = 5;
    PageData page_data = 6;
    SyncComplete sync_complete = 7;
    SyncError error = 8;
  }
}

// Sent first by the client. Server replies with HelloReply.
message Hello {
  uint32 protocol_version = 1;
  // SQLite page size in bytes (typically 4096).
  uint32 page_size = 2;
  // Highest page number the client knows about. 0 if the client is empty.
  uint32 max_page = 3;
}

message HelloReply {
  uint32 protocol_version = 1;
  uint32 page_size = 2;
  uint32 max_page = 3;
}

// Per-page hash for change detection. Hash is hex-encoded SHA-256 of the
// page's raw bytes.
message PageHash {
  uint32 page_no = 1;
  string hash = 2;
}

// Combined hash over a contiguous range — short-circuits when entire ranges
// are identical.
message PageHashBatch {
  uint32 start_page = 1;
  uint32 end_page = 2;
  string combined_hash = 3;
}

message PageData {
  uint32 page_no = 1;
  bytes data = 2;
}

message PageDataBatch {
  repeated PageData pages = 1;
}

// Server: "your page N differs from mine; send it".
message HashMismatch {
  uint32 page_no = 1;
}

message HashMismatchBatch {
  repeated uint32 page_numbers = 1;
}

// Server: "give me page N" (used in the pull direction).
message RequestPage {
  uint32 page_no = 1;
}

message RequestPages {
  repeated uint32 page_numbers = 1;
}

// Client: "I've sent everything I have to send" (hash-phase done). Server
// emits SyncComplete once any in-flight page requests resolve.
message Complete {}

message SyncComplete {
  uint64 pages_transferred = 1;
  uint64 bytes_transferred = 2;
}

message SyncError {
  string message = 1;
}
